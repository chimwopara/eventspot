<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventSpot - Pitch & Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #05070a;
      color: #d7dfd0;
      font-family: Manrope, "Avenir Next", "Segoe UI", sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    .boot-splash {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05070a;
    }

    .boot-splash__logo {
      width: 170px;
      height: 170px;
      filter: drop-shadow(0 0 30px rgba(16, 185, 129, 0.3));
    }
  </style>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
</head>
<body class="bg-[#05070a] text-[#d7dfd0]">
  <div id="root">
    <div class="boot-splash" aria-hidden="true">
      <svg viewBox="0 0 48 48" class="boot-splash__logo" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bootLogoOuter" x1="7" y1="6" x2="41" y2="42" gradientUnits="userSpaceOnUse">
            <stop stop-color="#34d399" />
            <stop offset="1" stop-color="#fbbf24" />
          </linearGradient>
          <linearGradient id="bootLogoTrail" x1="12" y1="33" x2="36" y2="14" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6ee7b7" />
            <stop offset="1" stop-color="#f59e0b" />
          </linearGradient>
          <radialGradient id="bootLogoGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(24 24) rotate(90) scale(16)">
            <stop stop-color="#6ee7b7" stop-opacity="0.28" />
            <stop offset="1" stop-color="#6ee7b7" stop-opacity="0" />
          </radialGradient>
        </defs>
        <rect x="4" y="4" width="40" height="40" rx="14" fill="url(#bootLogoOuter)" />
        <rect x="7.25" y="7.25" width="33.5" height="33.5" rx="11.5" fill="#06100c" />
        <circle cx="24" cy="24" r="14" fill="url(#bootLogoGlow)" />
        <path d="M12.7 30.4C16.8 24.9 21.2 23.4 25.8 24.7C29.9 25.9 33.1 23.5 35.9 17.5" stroke="url(#bootLogoTrail)" stroke-width="2.6" stroke-linecap="round" />
        <path d="M12.9 18.8C16.5 14.9 20.7 13.4 25 14.5C28.8 15.5 32.2 14.2 35.4 10.9" stroke="#34d399" stroke-opacity="0.66" stroke-width="2" stroke-linecap="round" />
        <circle cx="12.7" cy="30.4" r="2.1" fill="#6ee7b7" />
        <circle cx="35.9" cy="17.5" r="2.1" fill="#fbbf24" />
      </svg>
    </div>
  </div>

  <script>
    window.__eventspotBoot = {
      started: false,
      mounted: false,
      babelLoaded: false,
      babelFailed: false,
      babelTransformed: false,
      compileTimer: null,
      renderError: ''
    };

    function renderBootState(title, message, tone) {
      var root = document.getElementById('root');
      if (!root) return;
      var accent = tone === 'error' ? '#ef4444' : '#34d399';
      root.innerHTML = '' +
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#05070a;color:#d7dfd0;font-family:Manrope,Segoe UI,sans-serif;padding:24px;text-align:center;">' +
          '<div style="max-width:640px">' +
            '<h1 style="margin:0 0 10px;font-size:30px;font-weight:800;">EventSpot</h1>' +
            '<p style="margin:0 0 10px;font-size:14px;opacity:.92;">' + title + '</p>' +
            '<p style="margin:0;font-size:13px;line-height:1.5;opacity:.82;color:' + accent + ';">' + message + '</p>' +
          '</div>' +
        '</div>';
    }

    function compileAppScriptIfReady() {
      if (!window.Babel || typeof window.Babel.transformScriptTags !== 'function') return false;
      if (window.__eventspotBoot.babelTransformed) return true;
      if (window.__eventspotBoot.started || window.__eventspotBoot.mounted) {
        window.__eventspotBoot.babelTransformed = true;
        return true;
      }
      if (!document.getElementById('eventspot-app-script')) return false;
      try {
        window.Babel.transformScriptTags();
        window.__eventspotBoot.babelTransformed = true;
        if (window.__eventspotBoot.compileTimer) {
          clearInterval(window.__eventspotBoot.compileTimer);
          window.__eventspotBoot.compileTimer = null;
        }
        return true;
      } catch (err) {
        window.__eventspotBoot.renderError = err && err.message ? err.message : 'Babel compile failed.';
        renderBootState('Could not compile the app script.', window.__eventspotBoot.renderError, 'error');
        return false;
      }
    }

    function ensureBabelCompilation() {
      if (compileAppScriptIfReady()) return;
      if (window.__eventspotBoot.compileTimer) return;

      var attempts = 0;
      window.__eventspotBoot.compileTimer = setInterval(function () {
        attempts += 1;
        if (compileAppScriptIfReady()) return;
        if (attempts >= 80) {
          clearInterval(window.__eventspotBoot.compileTimer);
          window.__eventspotBoot.compileTimer = null;
          if (!window.__eventspotBoot.mounted) {
            renderBootState(
              'The app is taking too long to start.',
              'App dependencies did not initialize. Disable blockers, then hard refresh.',
              'error'
            );
          }
        }
      }, 100);
    }

    window.__eventspotBoot.requestCompile = ensureBabelCompilation;

    (function loadBabelWithFallback() {
      var sources = [
        'https://unpkg.com/@babel/standalone/babel.min.js',
        'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js'
      ];
      var i = 0;

      function tryNextSource() {
        if (i >= sources.length) {
          window.__eventspotBoot.babelFailed = true;
          renderBootState(
            'Could not start the app engine.',
            'Babel could not be loaded from CDN sources. Check network access, then hard refresh.',
            'error'
          );
          return;
        }

        var source = sources[i++];
        var script = document.createElement('script');
        var settled = false;
        var timeout = setTimeout(function () {
          if (settled) return;
          settled = true;
          script.remove();
          tryNextSource();
        }, 4500);

        script.src = source;
        script.async = false;
        script.onload = function () {
          if (settled) return;
          settled = true;
          clearTimeout(timeout);
          window.__eventspotBoot.babelLoaded = true;
          ensureBabelCompilation();
        };
        script.onerror = function () {
          if (settled) return;
          settled = true;
          clearTimeout(timeout);
          tryNextSource();
        };
        document.head.appendChild(script);
      }

      tryNextSource();
    })();

    document.addEventListener('DOMContentLoaded', ensureBabelCompilation);

  </script>

  <script id="eventspot-app-script" type="text/babel" data-type="module">
    import React, { useState, useEffect, useId } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0';
    import { 
      MapPin, Calendar, DollarSign, Award, Users, TrendingUp, Smartphone, 
      Search, ShieldCheck, ChevronRight, PlayCircle, BarChart3, Building, Briefcase,
      Building2, Home, BookOpen, Monitor, Megaphone, LineChart, LayoutDashboard, Layers,
      Zap, Clock, Globe, ArrowRight, CheckCircle2, User, Lock, Mail, Bell, CreditCard, LogOut, Settings, 
      ChevronLeft, X, SlidersHorizontal, Settings2, Camera, Star, Map, Plus, Maximize2
    } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    if (window.__eventspotBoot) window.__eventspotBoot.started = true;

    const EventSpotLogo = ({ className = "w-8 h-8" }) => {
      const outerGradientId = useId();
      const trailGradientId = useId();
      const glowGradientId = useId();

      return (
        <svg viewBox="0 0 48 48" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id={outerGradientId} x1="7" y1="6" x2="41" y2="42" gradientUnits="userSpaceOnUse">
              <stop stopColor="#34d399" />
              <stop offset="1" stopColor="#fbbf24" />
            </linearGradient>
            <linearGradient id={trailGradientId} x1="12" y1="33" x2="36" y2="14" gradientUnits="userSpaceOnUse">
              <stop stopColor="#6ee7b7" />
              <stop offset="1" stopColor="#f59e0b" />
            </linearGradient>
            <radialGradient id={glowGradientId} cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(24 24) rotate(90) scale(16)">
              <stop stopColor="#6ee7b7" stopOpacity="0.28" />
              <stop offset="1" stopColor="#6ee7b7" stopOpacity="0" />
            </radialGradient>
          </defs>

          <rect x="4" y="4" width="40" height="40" rx="14" fill={`url(#${outerGradientId})`} />
          <rect x="7.25" y="7.25" width="33.5" height="33.5" rx="11.5" fill="#06100c" />
          <circle cx="24" cy="24" r="14" fill={`url(#${glowGradientId})`} />

          <path
            d="M12.7 30.4C16.8 24.9 21.2 23.4 25.8 24.7C29.9 25.9 33.1 23.5 35.9 17.5"
            fill="none"
            stroke={`url(#${trailGradientId})`}
            strokeWidth="2.6"
            strokeLinecap="round"
          />
          <path
            d="M12.9 18.8C16.5 14.9 20.7 13.4 25 14.5C28.8 15.5 32.2 14.2 35.4 10.9"
            fill="none"
            stroke="#34d399"
            strokeOpacity="0.66"
            strokeWidth="2"
            strokeLinecap="round"
          />
          <circle cx="12.7" cy="30.4" r="2.1" fill="#6ee7b7" />
          <circle cx="35.9" cy="17.5" r="2.1" fill="#fbbf24" />
        </svg>
      );
    };

    function EventSpotApp() {
      const [activeTab, setActiveTab] = useState('home');
      const [isScrolled, setIsScrolled] = useState(false);
      const [pageScrollProgress, setPageScrollProgress] = useState(0);
      const [isDeepDiveOpen, setIsDeepDiveOpen] = useState(false);
      const isDeepDiveActive = activeTab === 'demo' && isDeepDiveOpen;

      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 20);
          const doc = document.documentElement;
          const scrollable = doc.scrollHeight - window.innerHeight;
          const progress = scrollable > 0 ? (window.scrollY / scrollable) * 100 : 0;
          setPageScrollProgress(Math.max(0, Math.min(progress, 100)));
        };
        handleScroll();
        window.addEventListener('scroll', handleScroll, { passive: true });
        window.addEventListener('resize', handleScroll);
        return () => {
          window.removeEventListener('scroll', handleScroll);
          window.removeEventListener('resize', handleScroll);
        };
      }, [activeTab, isDeepDiveActive]);

      useEffect(() => {
        if (activeTab !== 'demo') setIsDeepDiveOpen(false);
      }, [activeTab]);

      const navItems = [
        { id: 'home', label: 'Overview' },
        { id: 'demo', label: 'Interactive Demo' },
        { id: 'business', label: 'Business Case' },
        { id: 'financials', label: 'Pro Forma' },
        { id: 'team', label: 'Leadership' }
      ];

      return (
        <div className="min-h-screen bg-[#05070a] font-sans text-[#d7dfd0] overflow-hidden selection:bg-emerald-500/30 flex flex-col">
          <style>{`
            @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
            @keyframes float-reverse { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(20px) rotate(-2deg); } }
            @keyframes pulse-glow { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
            @keyframes dash-flow { to { stroke-dashoffset: -360; } }
            @keyframes orbit-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 0.24; } 50% { transform: scale(1.09); opacity: 0.52; } }
            @keyframes bob { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
            @keyframes aurora-shift { 0% { transform: translate3d(-4%, -3%, 0) scale(1); } 50% { transform: translate3d(4%, 3%, 0) scale(1.08); } 100% { transform: translate3d(-4%, -3%, 0) scale(1); } }
            .animate-float { animation: float 6s ease-in-out infinite; }
            .animate-float-delayed { animation: float-reverse 7s ease-in-out infinite; }
            .animate-glow { animation: pulse-glow 4s ease-in-out infinite; }
            .flow-dash { stroke-dasharray: 12 12; animation: dash-flow 12s linear infinite; }
            .animate-orbit-slow { animation: orbit-slow 22s linear infinite; transform-origin: center; }
            .animate-pulse-ring { animation: pulse-ring 4.5s ease-in-out infinite; transform-origin: center; }
            .animate-bob { animation: bob 4.8s ease-in-out infinite; }
            .aurora-bg { animation: aurora-shift 18s ease-in-out infinite; }
            .tilt-card { transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease; transform-style: preserve-3d; will-change: transform; }
            .tilt-card:hover { transform: perspective(1200px) rotateX(5deg) rotateY(-6deg) translateY(-6px); box-shadow: 0 24px 55px -35px rgba(52,211,153,0.65); border-color: rgba(52,211,153,0.45); }

            body { font-family: 'Manrope', 'Avenir Next', 'Segoe UI', sans-serif; background: #05070a; color: #d7dfd0; }
            h1, h2, h3, .font-extrabold { font-family: 'Fraunces', Georgia, serif; letter-spacing: 0.01em; }
            
            .glass-panel { background: rgba(12, 27, 18, 0.72); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(217, 171, 70, 0.16); }
            .glass-panel-hover:hover { background: rgba(18, 35, 24, 0.9); border: 1px solid rgba(217, 171, 70, 0.4); transform: translateY(-3px); box-shadow: 0 12px 36px -18px rgba(6, 95, 70, 0.85); }
            .text-gradient { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(110deg, #4ade80, #fbbf24); }
            
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            
            .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            
            .modal-slide-up { animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
            @keyframes modalSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
            
            .toggle-checkbox:checked { right: 0; border-color: #059669; }
            .toggle-checkbox:checked + .toggle-label { background-color: #059669; }
            .toggle-checkbox { right: 0; z-index: 1; border-color: #e2e8f0; transition: all 0.3s; }
            .toggle-label { width: 3rem; height: 1.5rem; background-color: #334155; border-radius: 9999px; transition: all 0.3s; }
          `}</style>

          <div className="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-900/20 blur-[120px] pointer-events-none"></div>
          <div className="fixed bottom-[-20%] right-[-10%] w-[40%] h-[50%] rounded-full bg-yellow-900/10 blur-[100px] pointer-events-none"></div>
          <div className="fixed inset-0 pointer-events-none aurora-bg bg-[radial-gradient(circle_at_18%_24%,rgba(16,185,129,0.16),transparent_36%),radial-gradient(circle_at_84%_18%,rgba(245,158,11,0.14),transparent_38%),radial-gradient(circle_at_56%_84%,rgba(110,231,183,0.08),transparent_42%)]"></div>
          {!isDeepDiveActive && (
            <div className="fixed top-0 left-0 right-0 z-[80] h-1 bg-[#07120d]/85 backdrop-blur-sm pointer-events-none">
              <div className="h-full bg-gradient-to-r from-emerald-400 via-lime-300 to-amber-400 shadow-[0_0_18px_rgba(52,211,153,0.45)] transition-[width] duration-150" style={{ width: `${pageScrollProgress}%` }}></div>
            </div>
          )}

          {!isDeepDiveActive && (
            <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'glass-panel border-b-white/10 py-3' : 'bg-transparent py-5'}`}>
              <div className="max-w-7xl mx-auto px-6 lg:px-12 flex justify-between items-center">
                <div className="flex items-center space-x-3 cursor-pointer group" onClick={() => setActiveTab('home')}>
                  <EventSpotLogo className="w-10 h-10 group-hover:scale-110 transition-transform duration-300 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]" />
                  <span className="font-extrabold text-xl tracking-tight text-white group-hover:text-emerald-200 transition-colors">EventSpot</span>
                </div>
                <div className="hidden md:flex bg-slate-900/50 p-1.5 rounded-full border border-white/5 backdrop-blur-md overflow-x-auto">
                  {navItems.map((item) => (
                    <button key={item.id} onClick={() => setActiveTab(item.id)} className={`px-5 py-2 text-sm font-medium rounded-full transition-all duration-300 whitespace-nowrap ${ activeTab === item.id ? 'bg-gradient-to-r from-emerald-500 to-amber-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-white/5' }`}>{item.label}</button>
                  ))}
                </div>
              </div>
            </nav>
          )}

          {!isDeepDiveActive && (
            <a
              href="https://chimwopara.com"
              target="_blank"
              rel="noopener noreferrer"
              className="fixed bottom-4 right-4 z-[70] rounded-full border border-emerald-500/30 bg-[#06110d]/85 px-4 py-2 text-[11px] font-bold uppercase tracking-[0.14em] text-emerald-200 backdrop-blur-sm transition-all hover:border-emerald-400/60 hover:text-white hover:shadow-[0_0_18px_rgba(16,185,129,0.35)]"
            >
              Website by Chim
            </a>
          )}

          <main className={`relative z-10 flex-grow w-full ${isDeepDiveActive ? 'max-w-none px-0 py-0' : 'pt-32 pb-24 max-w-7xl mx-auto px-6 lg:px-12 flex flex-col justify-center'}`}>
            {activeTab === 'home' && <HomeView setActiveTab={setActiveTab} />}
            {activeTab === 'demo' && (
              <DemoView
                isDeepDiveOpen={isDeepDiveOpen}
                onOpenDeepDive={() => setIsDeepDiveOpen(true)}
                onCloseDeepDive={() => setIsDeepDiveOpen(false)}
              />
            )}
            {activeTab === 'business' && <BusinessCaseView />}
            {activeTab === 'financials' && <FinancialsView />}
            {activeTab === 'team' && <TeamView />}
            {activeTab === 'privacy' && <PrivacyView />}
            {activeTab === 'terms' && <TermsView />}
          </main>

          {!isDeepDiveActive && (
            <footer className="relative z-10 border-t border-white/5 bg-slate-900/50 backdrop-blur-md pt-10 pb-8 mt-auto">
              <div className="max-w-7xl mx-auto px-6 lg:px-12">
                <div className="flex flex-col md:flex-row justify-between items-center mb-6 space-y-4 md:space-y-0">
                  <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setActiveTab('home')}>
                    <EventSpotLogo className="h-6 w-6 grayscale opacity-70 hover:grayscale-0 hover:opacity-100 transition-all" />
                    <span className="font-bold text-white tracking-wide">EventSpot Inc.</span>
                  </div>
                  <div className="flex space-x-8 text-sm font-medium">
                    <a href="#" onClick={(e) => { e.preventDefault(); setActiveTab('privacy'); }} className="text-slate-400 hover:text-emerald-400 transition-colors">Privacy Policy</a>
                    <a href="#" onClick={(e) => { e.preventDefault(); setActiveTab('terms'); }} className="text-slate-400 hover:text-emerald-400 transition-colors">Terms & Conditions</a>
                    <a href="#" className="text-slate-400 hover:text-emerald-400 transition-colors">Contact Us</a>
                  </div>
                </div>
                <div className="text-center md:text-left text-xs text-slate-500 flex flex-col md:flex-row justify-between items-center border-t border-white/5 pt-6">
                  <p>&copy; {new Date().getFullYear()} EventSpot Inc. All rights reserved.</p>
                  <p className="mt-2 md:mt-0">Headquartered in Edmonton, Alberta, Canada.</p>
                </div>
              </div>
            </footer>
          )}
        </div>
      );
    }

    /* =========================================
       1. HOME VIEW
    ========================================= */
    function HomeView({ setActiveTab }) {
      const scenes = [
        { id: 'hero', label: 'Opening Frame' },
        { id: 'market', label: 'City Pulse' },
        { id: 'flow', label: 'Platform Flow' },
        { id: 'cta', label: 'Launch Moment' },
      ];
      const [heroShift, setHeroShift] = useState(0);
      const [scrollPct, setScrollPct] = useState(0);
      const [activeScene, setActiveScene] = useState('hero');

      useEffect(() => {
        const handleScroll = () => {
          const y = window.scrollY || 0;
          const totalScrollable = document.documentElement.scrollHeight - window.innerHeight;
          const pct = totalScrollable > 0 ? (y / totalScrollable) * 100 : 0;
          setScrollPct(Math.max(0, Math.min(pct, 100)));
          setHeroShift(Math.min(y * 0.12, 120));

          let closestScene = 'hero';
          let bestDistance = Number.POSITIVE_INFINITY;

          scenes.forEach((scene) => {
            const el = document.getElementById(`scene-${scene.id}`);
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const distance = Math.abs(rect.top - window.innerHeight * 0.28);
            if (distance < bestDistance) {
              bestDistance = distance;
              closestScene = scene.id;
            }
          });

          setActiveScene((prev) => (prev === closestScene ? prev : closestScene));
        };

        handleScroll();
        window.addEventListener('scroll', handleScroll, { passive: true });
        window.addEventListener('resize', handleScroll);
        return () => {
          window.removeEventListener('scroll', handleScroll);
          window.removeEventListener('resize', handleScroll);
        };
      }, []);

      return (
        <div className="space-y-20 md:space-y-28 animate-in fade-in zoom-in-95 duration-700">
          <div className="hidden xl:flex fixed right-6 top-1/2 -translate-y-1/2 z-40 items-start gap-3">
            <div className="h-44 w-[3px] rounded-full bg-white/15 overflow-hidden">
              <div className="w-full bg-gradient-to-b from-emerald-300 to-amber-400 transition-[height] duration-150" style={{ height: `${scrollPct}%` }}></div>
            </div>
            <div className="space-y-2">
              {scenes.map((scene) => (
                <button
                  key={scene.id}
                  onClick={() => document.getElementById(`scene-${scene.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' })}
                  className={`block text-left text-[11px] uppercase tracking-[0.12em] font-bold transition-colors ${activeScene === scene.id ? 'text-amber-200' : 'text-slate-500 hover:text-slate-300'}`}
                >
                  {scene.label}
                </button>
              ))}
            </div>
          </div>

          <section id="scene-hero" className="relative">

                    ].map(r => (
                      <div key={r.id} onClick={() => setDdRole(r.id)} className={`p-5 rounded-2xl border-2 cursor-pointer transition-all duration-300 ${ddRole === r.id ? r.sel : 'border-white/10 bg-slate-800/30 hover:border-white/20'}`}>
                        <div className="flex items-center space-x-4">
                          <div className="h-10 w-10 rounded-xl bg-black/20 border border-white/10 flex items-center justify-center"><r.icon className="h-5 w-5 text-slate-200" /></div>
                          <div className="flex-1"><div className="font-bold text-white text-lg">{r.label}</div><div className="text-sm text-slate-400 mt-0.5">{r.sub}</div></div>
                          <div className={`h-5 w-5 rounded-full border-2 flex items-center justify-center ${ddRole === r.id ? r.dot+' border-transparent' : 'border-slate-600'}`}>{ddRole === r.id && <div className="h-2 w-2 bg-white rounded-full"></div>}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button disabled={!ddRole} onClick={() => setStep('ready')} className={`w-full mt-6 text-white font-bold py-4 rounded-2xl transition-all shadow-lg ${ddRole ? 'bg-gradient-to-r from-emerald-600 to-amber-600 hover:opacity-90 shadow-emerald-500/20' : 'bg-slate-700 opacity-40 cursor-not-allowed'}`}>Continue</button>
                </div>
              )}

              {step === 'ready' && (
                <div className="w-full max-w-md animate-in fade-in zoom-in-95 duration-700 text-center">
                  <div className="h-24 w-24 rounded-full bg-gradient-to-br from-emerald-500 to-amber-600 flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-emerald-500/30"><CheckCircle2 className="h-12 w-12 text-white"/></div>
                  <h1 className="text-4xl font-extrabold text-white mb-3">You're all set, {form.firstName}!</h1>
                  <p className="text-slate-400 mb-4 text-lg">Your EventSpot account is ready.</p>
                  <div className={`inline-flex items-center px-5 py-2.5 rounded-full text-sm font-bold mb-10 ${ddRole==='renter'?'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30':ddRole==='leaser'?'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30':'bg-amber-500/20 text-amber-300 border border-amber-500/30'}`}>{ddRole==='renter'?'Space Renter':ddRole==='leaser'?'Space Leaser':'Event Sponsor'} · Edmonton, AB</div>
                  <button onClick={() => { setStep('app'); setAppTab(ddRole==='renter'?'hub':ddRole==='leaser'?'dashboard':'discover'); }} className="w-full bg-gradient-to-r from-emerald-600 to-amber-600 text-white font-bold py-5 rounded-2xl hover:opacity-90 transition-opacity shadow-lg shadow-emerald-500/20 text-lg flex items-center justify-center">Explore EventSpot <ArrowRight className="ml-3 h-5 w-5"/></button>
                </div>
              )}

            </div>
          </div>
        );
      }

      // ---- FULL APP VIEW ----
      return (
        <div className="fixed inset-0 z-[200] bg-[#040913] flex flex-col overflow-hidden">
          <div className="absolute inset-0 aurora-bg pointer-events-none bg-[radial-gradient(circle_at_18%_24%,rgba(16,185,129,0.16),transparent_40%),radial-gradient(circle_at_82%_20%,rgba(245,158,11,0.14),transparent_38%),radial-gradient(circle_at_52%_78%,rgba(52,211,153,0.16),transparent_42%)]"></div>
          <div className="absolute inset-0 pointer-events-none bg-[linear-gradient(135deg,rgba(4,9,19,0.42),rgba(4,9,19,0.78))]"></div>
          {/* Toast */}
          {ddToast && (
            <div className="fixed top-4 sm:top-5 left-1/2 -translate-x-1/2 z-[400] toast-enter pointer-events-none px-4">
              <div className="bg-[#1e293b] border border-emerald-500/40 text-white text-xs sm:text-sm font-bold px-4 sm:px-6 py-3 sm:py-3.5 rounded-2xl shadow-2xl flex items-center whitespace-nowrap"><CheckCircle2 className="h-4 w-4 text-emerald-400 mr-2"/> {ddToast}</div>
            </div>
          )}

          {/* BOOKING FLOW */}
          {bookingFlow && selectedSpace && (
            <div className="absolute inset-0 z-[300] bg-[#070c18] flex flex-col animate-in slide-in-from-right duration-300">
              <div className="h-14 sm:h-16 bg-[#0c1220] border-b border-white/5 flex items-center px-4 sm:px-6 flex-shrink-0">
                <button onClick={() => { if(bookingFlow==='detail'){setBookingFlow(null);setSelectedSpace(null);}else if(bookingFlow==='calendar')setBookingFlow('detail');else if(bookingFlow==='payment')setBookingFlow('calendar'); }} className="mr-3 sm:mr-4 h-8 w-8 sm:h-9 sm:w-9 rounded-xl bg-slate-800/60 border border-white/10 flex items-center justify-center hover:bg-slate-700 transition-colors"><ChevronLeft className="h-4 w-4 sm:h-5 sm:w-5 text-white"/></button>
                <span className="font-bold text-sm sm:text-base text-white truncate pr-2">{bookingFlow==='detail'?selectedSpace.name:bookingFlow==='calendar'?'Select Date & Time':bookingFlow==='payment'?'Payment':'Booking Confirmed!'}</span>
                {bookingFlow!=='confirm' && <span className="ml-auto text-xs text-slate-500 hidden sm:block">{bookingFlow==='detail'?'1 / 3':bookingFlow==='calendar'?'2 / 3':'3 / 3'}</span>}
              </div>
              <div className="flex-1 overflow-y-auto hide-scrollbar">
                {bookingFlow==='detail' && (
                  <div className="max-w-2xl mx-auto p-4 sm:p-6 md:p-8">
                    <div className={`h-44 sm:h-56 rounded-3xl bg-gradient-to-br ${selectedSpace.color} border ${selectedSpace.border} mb-6 sm:mb-8 overflow-hidden`}>
                      <img src={selectedSpace.image} alt={selectedSpace.name} className="h-full w-full object-cover" loading="lazy" />
                    </div>
                    <div className="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4 mb-6">
                      <div><h2 className="text-2xl sm:text-3xl font-extrabold text-white mb-1">{selectedSpace.name}</h2><p className="text-slate-400 flex items-center"><MapPin className="h-4 w-4 mr-1"/> {selectedSpace.area} · {selectedSpace.type}</p></div>
                      <div className="text-right"><p className={`text-3xl font-extrabold ${selectedSpace.accent}`}>${selectedSpace.price}</p><p className="text-xs text-slate-500">per hour</p></div>
                    </div>
                    <div className="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-6 mb-8 pb-8 border-b border-white/5">
                      <div className="flex items-center"><Star className="h-4 w-4 text-yellow-400 mr-1.5"/><span className="font-bold text-white">{selectedSpace.rating}</span><span className="text-slate-400 ml-1 text-sm">({selectedSpace.reviews} reviews)</span></div>
                      <div className="flex items-center"><Users className="h-4 w-4 text-slate-400 mr-1.5"/><span className="text-slate-300 text-sm">{selectedSpace.capacity}</span></div>
                    </div>
                    <div className="mb-10"><h3 className="font-bold text-white mb-4 text-lg">Amenities</h3><div className="flex flex-wrap gap-3">{selectedSpace.amenities.map(a => <span key={a} className="bg-slate-800/60 border border-white/5 text-slate-300 text-sm px-4 py-2 rounded-full inline-flex items-center"><CheckCircle2 className="h-3.5 w-3.5 mr-1.5 text-emerald-400" />{a}</span>)}</div></div>
                    <button onClick={() => setBookingFlow('calendar')} className="w-full bg-gradient-to-r from-emerald-600 to-amber-600 text-white font-bold py-4 sm:py-5 rounded-2xl text-base sm:text-lg hover:opacity-90 transition-opacity shadow-lg shadow-emerald-500/20 flex items-center justify-center">Book This Space <ArrowRight className="ml-3 h-5 w-5"/></button>
                  </div>
                )}
                {bookingFlow==='calendar' && (
                  <div className="max-w-lg mx-auto p-4 sm:p-6 md:p-8">
                    <h3 className="font-bold text-white text-lg sm:text-xl mb-6">Choose a Date — April 2026</h3>
                    <div className="grid grid-cols-7 gap-1.5 sm:gap-2 mb-8">
                      {['S','M','T','W','T','F','S'].map((d,i) => <div key={i} className="text-center text-xs text-slate-500 font-bold py-2">{d}</div>)}
                      {[...Array(30)].map((_,i) => { const day=i+1; const isPast=day<15; const isSel=selectedDate===`Apr ${day}`; return <button key={day} disabled={isPast} onClick={()=>setSelectedDate(`Apr ${day}`)} className={`aspect-square rounded-xl text-sm font-bold transition-all ${isSel?'bg-emerald-600 text-white shadow-lg':isPast?'text-slate-700 cursor-not-allowed':'text-slate-300 hover:bg-slate-800'}`}>{day}</button>; })}
                    </div>
                    <h3 className="font-bold text-white text-lg sm:text-xl mb-4">Start Time</h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-8">{['10:00 AM','12:00 PM','2:00 PM','4:00 PM','6:00 PM','8:00 PM'].map(t => <button key={t} onClick={()=>setSelectedTime(t)} className={`py-3 rounded-xl text-sm font-bold border transition-all ${selectedTime===t?'bg-emerald-600 border-emerald-500 text-white':'bg-slate-800/50 border-white/5 text-slate-300 hover:border-emerald-500/50'}`}>{t}</button>)}</div>
                    <div className="bg-slate-800/50 rounded-2xl p-4 border border-white/5 mb-6">
                      <div className="flex justify-between text-sm mb-2"><span className="text-slate-400">Duration</span><span className="text-white font-bold">3 hours</span></div>
                      <div className="flex justify-between text-sm"><span className="text-slate-400">Estimated Total</span><span className={`font-bold ${selectedSpace.accent}`}>${selectedSpace.price*3} + tax</span></div>
                    </div>
                    <button onClick={() => setBookingFlow('payment')} className="w-full bg-gradient-to-r from-emerald-600 to-amber-600 text-white font-bold py-4 sm:py-5 rounded-2xl text-base sm:text-lg hover:opacity-90 transition-opacity shadow-lg shadow-emerald-500/20">Next: Payment</button>
                  </div>
                )}
                {bookingFlow==='payment' && (
                  <div className="max-w-lg mx-auto p-4 sm:p-6 md:p-8">
                    <div className="bg-slate-800/40 rounded-2xl p-5 border border-white/5 mb-8">
                      <div className="text-xs text-slate-400 font-bold mb-4">BOOKING SUMMARY</div>
                      <div className="flex justify-between mb-2"><span className="text-slate-300 font-medium">{selectedSpace.name}</span><span className={`font-bold ${selectedSpace.accent}`}>${selectedSpace.price}/hr</span></div>
                      <div className="text-sm text-slate-400 mb-3">{selectedDate}, 2026 · {selectedTime} · 3 hrs</div>
                      <div className="border-t border-white/5 pt-4 flex justify-between"><span className="font-bold text-white">Total</span><span className="font-extrabold text-emerald-400 text-xl">${Math.round(selectedSpace.price*3*1.1)}</span></div>
                    </div>
                    <h3 className="font-bold text-white text-xl mb-5">Payment Method</h3>
                    <div className="bg-gradient-to-br from-slate-800 to-slate-700/80 rounded-2xl p-5 sm:p-6 border border-white/10 mb-6 relative overflow-hidden">

                      <p className="text-slate-400 text-xs font-bold tracking-widest mb-4">VISA</p>
                      <p className="text-white text-xl tracking-widest font-mono mb-5">**** **** **** 4242</p>
                      <div className="flex justify-between text-sm text-slate-300"><span>{form.firstName} {form.lastName}</span><span>12/28</span></div>
                    </div>
                    <button onClick={() => { setBookings([...bookings,{id:Date.now(),space:selectedSpace.name,image:selectedSpace.image,date:selectedDate+', 2026',time:selectedTime+' · 3 hrs',status:'Confirmed',amount:'$'+Math.round(selectedSpace.price*3*1.1)}]); setBookingFlow('confirm'); }} className="w-full bg-gradient-to-r from-emerald-600 to-amber-600 text-white font-bold py-4 sm:py-5 rounded-2xl text-base sm:text-lg hover:opacity-90 transition-opacity shadow-lg shadow-emerald-500/20 flex items-center justify-center">Confirm & Pay <DollarSign className="ml-2 h-5 w-5"/></button>
                  </div>
                )}
                {bookingFlow==='confirm' && (
                  <div className="max-w-lg mx-auto p-4 sm:p-6 md:p-8 text-center">
                    <div className="h-20 w-20 sm:h-24 sm:w-24 rounded-full bg-gradient-to-br from-emerald-500 to-green-600 flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-emerald-500/30"><CheckCircle2 className="h-10 w-10 sm:h-12 sm:w-12 text-white"/></div>
                    <h2 className="text-2xl sm:text-3xl font-extrabold text-white mb-2">Booking Confirmed!</h2>
                    <p className="text-slate-400 mb-8">{selectedSpace.name} is locked in for you.</p>
                    <div className="bg-slate-800/40 rounded-2xl p-5 sm:p-6 border border-emerald-500/20 text-left mb-8 space-y-4">
                      <div className="flex justify-between"><span className="text-slate-400">Space</span><span className="text-white font-bold">{selectedSpace.name}</span></div>
                      <div className="flex justify-between"><span className="text-slate-400">Date</span><span className="text-white font-bold">{selectedDate}, 2026</span></div>
                      <div className="flex justify-between"><span className="text-slate-400">Time</span><span className="text-white font-bold">{selectedTime} · 3 hrs</span></div>
                      <div className="flex justify-between"><span className="text-slate-400">Total Charged</span><span className="font-bold text-emerald-400">${Math.round(selectedSpace.price*3*1.1)}</span></div>
                    </div>
                    <button onClick={() => { setBookingFlow(null); setSelectedSpace(null); setAppTab('booked'); }} className="w-full bg-gradient-to-r from-emerald-600 to-amber-600 text-white font-bold py-4 rounded-2xl hover:opacity-90 transition-opacity shadow-lg shadow-emerald-500/20">View My Bookings</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* SPONSOR PROPOSAL */}
          {proposalOpen && selectedEvent && (
            <div className="absolute inset-0 z-[300] bg-[#070c18]/95 backdrop-blur flex items-center justify-center p-4 sm:p-6 animate-in fade-in duration-200">
              <div className="w-full max-w-lg bg-[#0c1220] rounded-3xl border border-amber-500/20 overflow-hidden shadow-2xl">
                <div className="p-4 sm:p-6 border-b border-white/5 flex items-center justify-between"><h3 className="font-bold text-white text-lg sm:text-xl">Submit Sponsorship Offer</h3><button onClick={() => setProposalOpen(false)} className="h-8 w-8 rounded-full bg-slate-800 flex items-center justify-center"><X className="h-4 w-4 text-white"/></button></div>
                <div className="p-4 sm:p-6 space-y-5">
                  <div className="bg-amber-500/10 border border-amber-500/20 rounded-2xl overflow-hidden">
                    <div className="h-32 sm:h-36 overflow-hidden">
                      <img src={selectedEvent.image} alt={selectedEvent.name} className="h-full w-full object-cover" loading="lazy" />
                    </div>
                    <div className="p-4">
                      <div className="font-bold text-white mb-1">{selectedEvent.name}</div>
                      <div className="text-sm text-slate-400 mb-3">By {selectedEvent.org} · {selectedEvent.date}</div>
                      <div className="flex items-center space-x-3"><div className="flex-1 bg-slate-700/50 rounded-full h-2 overflow-hidden"><div className="h-full bg-amber-500 rounded-full" style={{width:`${(selectedEvent.raised/selectedEvent.asking)*100}%`}}></div></div><span className="text-xs text-amber-300 font-bold">${selectedEvent.raised}/${selectedEvent.asking}</span></div>
                    </div>
                  </div>
                  <div><label className="text-xs font-bold text-slate-400 mb-2 block">YOUR OFFER (CAD)</label><div className="relative"><DollarSign className="absolute left-4 top-3.5 h-5 w-5 text-slate-500"/><input type="number" value={proposalAmt} onChange={e=>setProposalAmt(e.target.value)} className="w-full bg-slate-800/50 border border-white/10 rounded-2xl pl-12 pr-4 py-4 text-white text-xl font-bold outline-none focus:border-amber-500 transition-colors"/></div></div>
                  <div><label className="text-xs font-bold text-slate-400 mb-2 block">MESSAGE TO ORGANIZER</label><textarea rows={3} defaultValue={`Hi ${selectedEvent.org},\n\nWe'd love to sponsor ${selectedEvent.name} in exchange for logo placement and a shoutout at the event.\n\n— ${form.firstName} ${form.lastName}`} className="w-full bg-slate-800/50 border border-white/10 rounded-2xl px-4 py-3 text-sm text-slate-300 outline-none focus:border-amber-500 transition-colors resize-none"/></div>
                  <button onClick={() => { setMyCampaigns([...myCampaigns,{id:Date.now(),event:selectedEvent.name,amount:Number(proposalAmt),status:'Pending',impressions:'Est. '+selectedEvent.attendees,reach:'TBD'}]); setProposalOpen(false); showToast('Offer sent to '+selectedEvent.org+'!'); setAppTab('campaigns'); }} className="w-full bg-gradient-to-r from-amber-600 to-emerald-600 text-white font-bold py-4 rounded-2xl hover:opacity-90 transition-opacity shadow-lg shadow-amber-500/20">Submit Offer</button>
                </div>
              </div>
            </div>
          )}

          {/* CREATE LISTING */}
          {createStep !== null && (
            <div className="absolute inset-0 z-[300] bg-[#070c18] flex flex-col animate-in slide-in-from-bottom duration-300">
              <div className="h-14 sm:h-16 bg-[#0c1220] border-b border-white/5 flex items-center px-4 sm:px-6 flex-shrink-0">
                <button onClick={() => { if(createStep>0)setCreateStep(createStep-1);else setCreateStep(null); }} className="mr-3 sm:mr-4 h-8 w-8 sm:h-9 sm:w-9 rounded-xl bg-slate-800/60 border border-white/10 flex items-center justify-center"><ChevronLeft className="h-4 w-4 sm:h-5 sm:w-5 text-white"/></button>
                <span className="font-bold text-sm sm:text-base text-white">{['Space Details','Pricing & Rules','Review & Publish'][createStep]}</span>
                <span className="ml-auto text-xs text-slate-500 hidden sm:block">Step {createStep+1} of 3</span>
              </div>
              <div className="flex-1 flex items-center justify-center p-4 sm:p-6 md:p-8 overflow-y-auto">
                {createStep===0 && (
                  <div className="w-full max-w-lg space-y-5">
                    <div onClick={()=>showToast('Photo uploader will be available in production build.')} className="h-40 bg-slate-800/50 border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:border-emerald-500/50 transition-colors"><Camera className="h-8 w-8 text-slate-500 mb-2"/><span className="text-sm text-slate-400 font-medium">Upload Photos</span></div>
                    <div><label className="text-xs font-bold text-slate-400 mb-2 block">SPACE NAME</label><input value={newListing.name} onChange={e=>setNewListing({...newListing,name:e.target.value})} placeholder="e.g. Sunny Studio Loft" className="w-full bg-slate-800/50 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none focus:border-emerald-500 transition-colors"/></div>
                    <div><label className="text-xs font-bold text-slate-400 mb-2 block">TYPE</label><div className="flex flex-wrap gap-2">{['Indoor','Outdoor','Academic','Studio','Retail','Industrial'].map(t=><button key={t} onClick={()=>setNewListing({...newListing,type:t})} className={`px-4 py-2 rounded-full text-sm font-bold border transition-all ${newListing.type===t?'bg-emerald-600 border-emerald-500 text-white':'bg-slate-800/50 border-white/5 text-slate-400 hover:border-white/20'}`}>{t}</button>)}</div></div>
                    <div><label className="text-xs font-bold text-slate-400 mb-2 block">ADDRESS</label><input value={newListing.address} onChange={e=>setNewListing({...newListing,address:e.target.value})} placeholder="123 Jasper Ave, Edmonton, AB" className="w-full bg-slate-800/50 border border-white/10 rounded-2xl px-5 py-4 text-white outline-none focus:border-emerald-500 transition-colors"/></div>
                    <button onClick={()=>setCreateStep(1)} className="w-full bg-gradient-to-r from-emerald-600 to-green-600 text-white font-bold py-4 rounded-2xl hover:opacity-90 transition-opacity shadow-lg shadow-emerald-500/20">Continue</button>
                  </div>
                )}
                {createStep===1 && (
                  <div className="w-full max-w-lg space-y-5">
                    <div><label className="text-xs font-bold text-slate-400 mb-2 block">HOURLY RATE (CAD)</label><div className="relative"><DollarSign className="absolute left-4 top-3.5 h-5 w-5 text-slate-500"/><input type="number" value={newListing.price} onChange={e=>setNewListing({...newListing,price:e.target.value})} placeholder="60" className="w-full bg-slate-800/50 border border-white/10 rounded-2xl pl-12 pr-4 py-4 text-white text-xl font-bold outline-none focus:border-emerald-500 transition-colors"/></div></div>
                    <div className="bg-slate-800/30 rounded-2xl p-5 border border-white/5"><div className="font-bold text-white mb-1 text-sm">EventSpot Transaction Fee</div><p className="text-sm text-slate-400">We take a flat <span className="text-emerald-400 font-bold">5%</span> per confirmed booking. No monthly fees, no surprises.</p></div>
                    <div><label className="text-xs font-bold text-slate-400 mb-2 block">HOUSE RULES (OPTIONAL)</label><textarea rows={3} placeholder="e.g. No smoking, max 30 guests, shoes off inside..." className="w-full bg-slate-800/50 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white outline-none focus:border-emerald-500 transition-colors resize-none"/></div>
                    <button onClick={()=>setCreateStep(2)} className="w-full bg-gradient-to-r from-emerald-600 to-green-600 text-white font-bold py-4 rounded-2xl hover:opacity-90 transition-opacity shadow-lg shadow-emerald-500/20">Review Listing</button>
                  </div>
                )}
                {createStep===2 && (
                  <div className="w-full max-w-lg">
                    <div className="bg-slate-800/40 rounded-3xl border border-white/5 overflow-hidden mb-6">
                      <div className="h-40 bg-gradient-to-br from-emerald-900/40 to-slate-800 flex items-center justify-center"><Building2 className="h-12 w-12 text-white/30" /></div>
                      <div className="p-6"><div className="flex justify-between items-start mb-3"><div><h3 className="font-bold text-white text-xl">{newListing.name||'Untitled Space'}</h3><p className="text-slate-400 text-sm mt-1">{newListing.type} · Edmonton, AB</p></div><div className="text-right"><p className="text-emerald-400 font-extrabold text-2xl">${newListing.price||'60'}</p><p className="text-xs text-slate-500">/hr</p></div></div><div className="bg-emerald-500/10 border border-emerald-500/20 rounded-xl px-4 py-2 text-xs text-emerald-300 font-bold inline-flex items-center"><div className="h-2 w-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></div>Ready to publish</div></div>
                    </div>
                    <button onClick={() => { setMyListings([...myListings,{id:Date.now(),name:newListing.name||'New Space',price:Number(newListing.price)||60,status:'Active',bookings:0,earned:'$0',image:'https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1200&q=80'}]); setCreateStep(null); setNewListing({name:'',price:'60',type:'Indoor',address:''}); showToast('Space published successfully!'); }} className="w-full bg-gradient-to-r from-emerald-600 to-green-600 text-white font-bold py-5 rounded-2xl text-lg hover:opacity-90 transition-opacity shadow-lg shadow-emerald-500/20 flex items-center justify-center">Publish Space <ArrowRight className="ml-3 h-5 w-5"/></button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* TOP HEADER */}

    const mountNode = document.getElementById('root');
    const showFatalError = (message) => {
      if (window.__eventspotBoot) window.__eventspotBoot.renderError = message || 'Unknown render error';
      if (!mountNode) return;
      mountNode.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#05070a;color:#d7dfd0;font-family:Manrope,Segoe UI,sans-serif;padding:24px;text-align:center;">

            <h1 style="margin:0 0 10px;font-size:30px;font-weight:800;">EventSpot</h1>
            <p style="margin:0 0 10px;font-size:14px;opacity:.85;">The app hit a render error. Refresh once, then retry.</p>
            <code style="display:block;font-size:12px;opacity:.65;line-height:1.4;">${message || 'Unknown render error'}</code>
          </div>
        </div>
      `;
    };

    window.addEventListener('error', (event) => {
      if (event?.message) showFatalError(event.message);
    });

    try {
      if (!mountNode) throw new Error('Root mount node was not found.');
      const root = createRoot(mountNode);
      window.setTimeout(() => {
        root.render(<EventSpotApp />);
        if (window.__eventspotBoot) window.__eventspotBoot.mounted = true;
      }, 1000);
    } catch (err) {
      showFatalError(err?.message);
    }

  <script>
    if (window.__eventspotBoot && typeof window.__eventspotBoot.requestCompile === 'function') {
      window.__eventspotBoot.requestCompile();
    }
