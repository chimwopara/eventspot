  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #05070a;
      color: #d7dfd0;
      font-family: Manrope, "Avenir Next", "Segoe UI", sans-serif;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; overflow-x: hidden; }

    @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
    @keyframes float-reverse { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(20px) rotate(-2deg); } }
    @keyframes pulse-glow { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
    @keyframes dash-flow { to { stroke-dashoffset: -360; } }
    @keyframes orbit-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 0.24; } 50% { transform: scale(1.09); opacity: 0.52; } }
    @keyframes bob { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    @keyframes aurora-shift { 0% { opacity: 0.85; } 50% { opacity: 1; } 100% { opacity: 0.85; } }
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-float-delayed { animation: float-reverse 7s ease-in-out infinite; }
    .animate-glow { animation: pulse-glow 4s ease-in-out infinite; }
    .flow-dash { stroke-dasharray: 12 12; animation: dash-flow 12s linear infinite; }
    .animate-orbit-slow { animation: orbit-slow 22s linear infinite; transform-origin: center; }
    .animate-pulse-ring { animation: pulse-ring 4.5s ease-in-out infinite; transform-origin: center; }
    .animate-bob { animation: bob 4.8s ease-in-out infinite; }
    .aurora-bg { animation: aurora-shift 18s ease-in-out infinite; }
    .tilt-card { transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease; transform-style: preserve-3d; will-change: transform; }
    .tilt-card:hover { transform: perspective(1200px) rotateX(5deg) rotateY(-6deg) translateY(-6px); box-shadow: 0 24px 55px -35px rgba(52,211,153,0.65); border-color: rgba(52,211,153,0.45); }

    body { font-family: 'Manrope', 'Avenir Next', 'Segoe UI', sans-serif; background: #05070a; color: #d7dfd0; }
    h1, h2, h3, .font-extrabold { font-family: 'Fraunces', Georgia, serif; letter-spacing: 0.01em; }

    .glass-panel { background: rgba(12, 27, 18, 0.72); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(217, 171, 70, 0.16); }
    .glass-panel-hover:hover { background: rgba(18, 35, 24, 0.9); border: 1px solid rgba(217, 171, 70, 0.4); transform: translateY(-3px); box-shadow: 0 12px 36px -18px rgba(6, 95, 70, 0.85); }
    .text-gradient { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(110deg, #4ade80, #fbbf24); }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-slide-up { animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes modalSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .toggle-checkbox:checked { right: 0; border-color: #059669; }
    .toggle-checkbox:checked + .toggle-label { background-color: #059669; }
    .toggle-checkbox { right: 0; z-index: 1; border-color: #e2e8f0; transition: all 0.3s; }
    .toggle-label { width: 3rem; height: 1.5rem; background-color: #334155; border-radius: 9999px; transition: all 0.3s; }
  </style>

  function ddHandleOfferClick(idx) {
    const event = ddEvents[idx];
    const existing = S.ddMyCampaigns.find(c=>c.event===event.name);
    if(existing){ S.ddAppTab='campaigns'; ddToast('You already submitted an offer for this event.'); return; }
    S.ddSelectedEvent = event;
    S.ddProposalOpen = true;
    render();
  }
  function ddSubmitProposal() {
    const ev = S.ddSelectedEvent;
    S.ddMyCampaigns.push({id:Date.now(),event:ev.name,amount:Number(S.ddProposalAmt),status:'Pending',impressions:'Est. '+ev.attendees,reach:'TBD'});
    S.ddProposalOpen = false;
    S.ddAppTab = 'campaigns';
    ddToast('Offer sent to '+ev.org+'!');
  }
  function ddHandleLeaserDecision(reqName, accepted) {
    S.ddLeaserRequests = S.ddLeaserRequests.filter(r=>r.name!==reqName);
    ddToast(accepted ? 'Accepted '+reqName+"'s request." : 'Declined '+reqName+"'s request.");
  }

  // ---- COMPUTED ----
  function isDeepDiveActive() { return S.activeTab === 'demo' && S.isDeepDiveOpen; }

  function getEffectiveDdTab() {
    const role = S.ddRole;
    const tab = S.ddAppTab;
    const renterTabs = ['hub','booked','explore','profile'];
    const leaserTabs = ['dashboard','listings','requests','profile'];
    const sponsorTabs = ['discover','campaigns','analytics','profile'];
    const valid = role==='renter'?renterTabs:role==='leaser'?leaserTabs:sponsorTabs;
    if(valid.includes(tab)) return tab;
    return role==='renter'?'hub':role==='leaser'?'dashboard':'discover';
  }

  function getFilteredDdSpaces() {
    if(S.ddSpaceFilter==='All') return ddSpaces;
    if(S.ddSpaceFilter==='Rooftop') return ddSpaces.filter(s=>s.type.includes('Rooftop'));
    return ddSpaces.filter(s=>s.type.includes(S.ddSpaceFilter));
  }
  function getFilteredDdEvents() {
    if(S.ddEventFilter==='All') return ddEvents;
    return ddEvents.filter(e=>e.niche===S.ddEventFilter);
  }

        <section><h2 class="text-2xl font-bold text-white mb-4">3. Data Security &amp; Sharing</h2><p class="text-slate-400">We implement robust security measures to protect your personal information. EventSpot does not sell, trade, or rent your personal identification information to others.</p></section>
        <section><h2 class="text-2xl font-bold text-white mb-4">4. Your Rights</h2><p class="text-slate-400">You have the right to access, update, or delete your personal information at any time through your account settings.</p></section>
      </div>
    </div></div>`;
  }

  function renderTermsView() {
    return `<div class="max-w-4xl mx-auto"><div class="glass-panel rounded-3xl p-8 md:p-12 border border-white/10"><h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Terms &amp; Conditions</h1><p class="text-slate-400 mb-8 pb-8 border-b border-white/10">Last updated: March 2026</p>
      <div class="space-y-8 text-slate-300 leading-relaxed">
        <section><h2 class="text-2xl font-bold text-white mb-4">1. Acceptance of Terms</h2><p class="text-slate-400">By accessing or using the EventSpot Inc. platform (the "Service"), you agree to be bound by these Terms and Conditions. If you disagree with any part of the terms, then you may not access the Service.</p></section>
        <section><h2 class="text-2xl font-bold text-white mb-4">2. User Responsibilities</h2><div class="space-y-4 text-slate-400"><p><strong>Renters:</strong> You agree to use booked spaces responsibly, adhere to the specific rules set by the Leaser, and vacate the premises at the agreed-upon time. Any damages incurred during your booking are your financial responsibility.</p><p><strong>Leasers:</strong> You confirm that you have the legal right to rent out the listed space. You must ensure the space is safe, clean, and accurately represented in your listing.</p><p><strong>Sponsors:</strong> You agree to fulfill the financial commitments made through the app in exchange for the promotional benefits agreed upon with the event organizer.</p></div></section>
        <section><h2 class="text-2xl font-bold text-white mb-4">3. Fees and Payments</h2><p class="text-slate-400">EventSpot charges a 5% transaction fee on successful bookings and offers optional pay-per-use visibility boosts for listing and sponsor placement. All fees are non-refundable unless otherwise stated in our cancellation policy.</p></section>
        <section><h2 class="text-2xl font-bold text-white mb-4">4. Limitation of Liability</h2><p class="text-slate-400">EventSpot acts as a marketplace facilitator. We do not own, manage, or control the spaces listed on our platform. In no event shall EventSpot Inc., nor its directors, employees, or partners, be liable for any indirect, incidental, special, consequential or punitive damages.</p></section>
      </div>
    </div></div>`;
  }

  // ====================== MAIN RENDER ======================
  function render() {
    const da = isDeepDiveActive();
    const navItems = [{id:'home',label:'Overview'},{id:'demo',label:'Interactive Demo'},{id:'business',label:'Business Case'},{id:'financials',label:'Pro Forma'},{id:'team',label:'Leadership'}];

    let mainHtml = '';
    if(S.activeTab==='home') mainHtml = renderHomeView();
    else if(S.activeTab==='demo') mainHtml = renderDemoView();
    else if(S.activeTab==='business') mainHtml = renderBusinessCaseView();
    else if(S.activeTab==='financials') mainHtml = renderFinancialsView();
    else if(S.activeTab==='team') mainHtml = renderTeamView();
    else if(S.activeTab==='privacy') mainHtml = renderPrivacyView();
    else if(S.activeTab==='terms') mainHtml = renderTermsView();

    const deepDiveHtml = renderDeepDive();

    const html = `<div class="min-h-screen bg-[#05070a] font-sans text-[#d7dfd0] overflow-hidden selection:bg-emerald-500/30 flex flex-col">
      ${!da?`<div class="fixed inset-0 pointer-events-none overflow-hidden"><div class="absolute inset-0 bg-[radial-gradient(circle_at_15%_20%,rgba(16,185,129,0.18),transparent_40%),radial-gradient(circle_at_85%_15%,rgba(245,158,11,0.14),transparent_38%),radial-gradient(circle_at_50%_80%,rgba(110,231,183,0.1),transparent_42%),radial-gradient(circle_at_30%_60%,rgba(6,95,70,0.12),transparent_45%),radial-gradient(circle_at_75%_75%,rgba(120,100,20,0.08),transparent_40%)] aurora-bg"></div></div>`:''}

      ${!da?`<div class="fixed top-0 left-0 right-0 z-[80] h-1 bg-[#07120d]/85 backdrop-blur-sm pointer-events-none"><div class="h-full bg-gradient-to-r from-emerald-400 via-lime-300 to-amber-400 shadow-[0_0_18px_rgba(52,211,153,0.45)] transition-[width] duration-150" style="width:${S.pageScrollProgress}%"></div></div>`:''}

      ${!da?`<nav class="fixed w-full z-50 transition-all duration-300 ${S.isScrolled?'glass-panel border-b-white/10 py-3':'bg-transparent py-5'}"><div class="max-w-7xl mx-auto px-6 lg:px-12 flex justify-between items-center">
        <div class="flex items-center space-x-3 cursor-pointer group" onclick="setTab('home')">${eventSpotLogo('w-10 h-10 group-hover:scale-110 transition-transform duration-300 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]')}<span class="font-extrabold text-xl tracking-tight text-white group-hover:text-emerald-200 transition-colors">EventSpot</span></div>
        <div class="hidden md:flex bg-slate-900/50 p-1.5 rounded-full border border-white/5 backdrop-blur-md overflow-x-auto">${navItems.map(item=>`<button onclick="setTab('${item.id}')" class="px-5 py-2 text-sm font-medium rounded-full transition-all duration-300 whitespace-nowrap ${S.activeTab===item.id?'bg-gradient-to-r from-emerald-500 to-amber-600 text-white shadow-md':'text-slate-400 hover:text-white hover:bg-white/5'}">${item.label}</button>`).join('')}</div>
      </div></nav>`:''}

      ${!da?`<a href="https://chimwopara.com" target="_blank" rel="noopener noreferrer" class="fixed bottom-4 right-4 z-[70] rounded-full border border-emerald-500/30 bg-[#06110d]/85 px-4 py-2 text-[11px] font-bold uppercase tracking-[0.14em] text-emerald-200 backdrop-blur-sm transition-all hover:border-emerald-400/60 hover:text-white hover:shadow-[0_0_18px_rgba(16,185,129,0.35)]">Website by Chim</a>`:''}

      <main class="relative z-10 flex-grow w-full ${da?'max-w-none px-0 py-0':'pt-32 pb-24 max-w-7xl mx-auto px-6 lg:px-12 flex flex-col justify-center'}">${mainHtml}</main>

      ${!da?`<footer class="relative z-10 border-t border-white/5 bg-slate-900/50 backdrop-blur-md pt-10 pb-8 mt-auto"><div class="max-w-7xl mx-auto px-6 lg:px-12">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 space-y-4 md:space-y-0">
          <div class="flex items-center space-x-2 cursor-pointer" onclick="setTab('home')">${eventSpotLogo('h-6 w-6 grayscale opacity-70 hover:grayscale-0 hover:opacity-100 transition-all')}<span class="font-bold text-white tracking-wide">EventSpot Inc.</span></div>
          <div class="flex space-x-8 text-sm font-medium"><a href="#" onclick="event.preventDefault();setTab('privacy')" class="text-slate-400 hover:text-emerald-400 transition-colors">Privacy Policy</a><a href="#" onclick="event.preventDefault();setTab('terms')" class="text-slate-400 hover:text-emerald-400 transition-colors">Terms &amp; Conditions</a><a href="#" class="text-slate-400 hover:text-emerald-400 transition-colors">Contact Us</a></div>
        </div>
        <div class="text-center md:text-left text-xs text-slate-500 flex flex-col md:flex-row justify-between items-center border-t border-white/5 pt-6"><p>&copy; ${new Date().getFullYear()} EventSpot Inc. All rights reserved.</p><p class="mt-2 md:mt-0">Headquartered in Edmonton, Alberta, Canada.</p></div>
      </div></footer>`:''}

    </div>${deepDiveHtml}`;

    document.getElementById('root').innerHTML = html;
    initExploreMap();
  }

  // ---- LEAFLET MAP ----
  let _mapInstance = null;
  function initExploreMap() {
    const container = document.getElementById('explore-map');
    if (!container) { if (_mapInstance) { _mapInstance.remove(); _mapInstance = null; } return; }
    if (_mapInstance) { _mapInstance.remove(); _mapInstance = null; }
    if (typeof L === 'undefined') return;

    const map = L.map(container, { zoomControl: true, attributionControl: false }).setView([53.535, -113.500], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      subdomains: 'abcd'
    }).addTo(map);

    const filteredSpaces = S.ddSpaceFilter === 'All' ? ddSpaces : ddSpaces.filter(s => {
      if (S.ddSpaceFilter === 'Rooftop') return s.type.includes('Rooftop');
      return s.type.includes(S.ddSpaceFilter);
    });

    filteredSpaces.forEach(space => {
      const markerIcon = L.divIcon({
        className: '',
        html: `<div class="space-marker"><img src="${space.image}" alt="${space.name}"/></div>`,
        iconSize: [40, 40],
        iconAnchor: [20, 20],
        popupAnchor: [0, -24]
      });
      const marker = L.marker([space.lat, space.lng], { icon: markerIcon }).addTo(map);
      marker.bindPopup(`
        <div style="min-width:200px">
          <img src="${space.image}" style="width:100%;height:80px;object-fit:cover;border-radius:8px;margin-bottom:8px"/>
          <div style="font-weight:800;color:#fff;font-size:14px;margin-bottom:2px">${space.name}</div>
          <div style="font-size:11px;color:#94a3b8;margin-bottom:6px">${space.area} · ${space.type}</div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="color:#6ee7b7;font-weight:800;font-size:16px">$${space.price}<span style="font-size:11px;color:#64748b">/hr</span></span>
            <span style="color:#fbbf24;font-size:12px">★ ${space.rating}</span>
          </div>
          <button onclick="ddOpenBookingDetailById(${space.id})" style="width:100%;margin-top:8px;padding:8px;background:linear-gradient(to right,#059669,#d97706);color:#fff;font-weight:700;font-size:12px;border:none;border-radius:12px;cursor:pointer">Book This Space</button>
        </div>
      `);
    });

    _mapInstance = map;
    setTimeout(() => map.invalidateSize(), 100);
  }

  // ---- SCROLL HANDLER ----
  function handleScroll() {
    S.isScrolled = window.scrollY > 20;
    const doc = document.documentElement;
    const scrollable = doc.scrollHeight - window.innerHeight;
    const progress = scrollable > 0 ? (window.scrollY / scrollable) * 100 : 0;
    S.pageScrollProgress = Math.max(0, Math.min(progress, 100));

    if(S.activeTab === 'home') {
      const y = window.scrollY || 0;
      const totalScrollable = doc.scrollHeight - window.innerHeight;
      const pct = totalScrollable > 0 ? (y / totalScrollable) * 100 : 0;
      S.scrollPct = Math.max(0, Math.min(pct, 100));
      S.heroShift = Math.min(y * 0.12, 120);

      const scenes = ['hero','market','flow','cta'];
      let closestScene = 'hero';
      let bestDistance = Infinity;
      scenes.forEach(sid => {
        const el = document.getElementById('scene-' + sid);
        if(!el) return;
        const rect = el.getBoundingClientRect();
        const distance = Math.abs(rect.top - window.innerHeight * 0.28);
        if(distance < bestDistance) { bestDistance = distance; closestScene = sid; }
      });
      if(S.activeScene !== closestScene) { S.activeScene = closestScene; }

      // Update parallax elements without full re-render
      const heroImg = document.querySelector('#scene-hero img');
      if(heroImg) heroImg.style.transform = `translateY(${S.heroShift}px) scale(1.08)`;

      const scrollBar = document.querySelector('.fixed.right-6 .bg-gradient-to-b');
      if(scrollBar) scrollBar.style.height = S.scrollPct + '%';

      const progressBar = document.querySelector('.fixed.top-0 .bg-gradient-to-r');
      if(progressBar) progressBar.style.width = S.pageScrollProgress + '%';
    } else {
      // Just update progress bar
      const progressBar = document.querySelector('.fixed.top-0 .bg-gradient-to-r');
      if(progressBar) progressBar.style.width = S.pageScrollProgress + '%';
    }
  }

  window.addEventListener('scroll', handleScroll, { passive: true });
  window.addEventListener('resize', handleScroll);

  // ---- INITIAL RENDER ----
  render();
  </script>
</body>
